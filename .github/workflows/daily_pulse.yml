name: Daily Pulse Analyst

on:
  schedule:
    - cron: '0 13 * * *' # Automatically runs at 9:00 AM EST (13:00 UTC)
  workflow_dispatch:      # Manual "Run" button

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # CRITICAL: This downloads your files to the runner
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Installs google-genai and requests
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ ! -f requirements.txt ]; then pip install google-genai requests; fi

      - name: Run Market Analysis
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          BEEHIIV_API_KEY: ${{ secrets.BEEHIIV_API_KEY }}
          BEEHIIV_PUBLICATION_ID: ${{ secrets.BEEHIIV_PUBLICATION_ID }}
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
        run: python dail-pulse.py
