name: Daily Pulse Analyst

on:
  schedule:
    - cron: '0 13 * * *' # Runs at 9:00 AM EST
  workflow_dispatch:      # Allows manual "Run" button

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # --- THIS IS THE MISSING PART ---
      - name: Checkout repository code
        uses: actions/checkout@v4
      # --------------------------------

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run Market Analysis
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          BEEHIIV_API_KEY: ${{ secrets.BEEHIIV_API_KEY }}
          BEEHIIV_PUBLICATION_ID: ${{ secrets.BEEHIIV_PUBLICATION_ID }}
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
        run: python dail-pulse.py
